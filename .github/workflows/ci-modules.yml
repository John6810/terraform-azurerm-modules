name: CI Modules

on:
  pull_request:
    paths:
      - "*/**.tf"
      - "!.github/**"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.changes.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        name: Detect modified modules
        run: |
          # List directories at root that contain .tf files (= modules)
          MODULES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.tf' \
            | cut -d'/' -f1 | sort -u \
            | while read dir; do [ -d "$dir" ] && [ -f "$dir/main.tf" ] && echo "$dir"; done \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules=$MODULES" >> "$GITHUB_OUTPUT"
          echo "Modified modules: $MODULES"

  validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ${{ matrix.module }}

      - name: Terraform Init
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.module }}
        run: terraform validate

      - name: Terraform Test
        working-directory: ${{ matrix.module }}
        # Runs any *.tftest.hcl found under tests/. Silent skip if the
        # module has no tests yet — see CONTRIBUTING.md "Testing" for
        # the convention.
        run: |
          if compgen -G "tests/*.tftest.hcl" > /dev/null; then
            terraform test
          else
            echo "No tests/*.tftest.hcl in ${{ matrix.module }} — skipping."
          fi

  validate-all:
    name: Validate All Modules (weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Validate all modules
        run: |
          FAILED=0
          for dir in */; do
            [ -f "$dir/main.tf" ] || continue
            MODULE=$(basename "$dir")
            echo "=== Validating $MODULE ==="
            cd "$dir"
            terraform init -backend=false > /dev/null 2>&1
            if ! terraform validate; then
              echo "FAILED: $MODULE"
              FAILED=1
            fi
            cd - > /dev/null
          done
          exit $FAILED
